name: win-ffi-build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    env:
      OUTPUT_FILE: ffikdb-win.tgz
      QHOME: ${{ github.workspace }}\qhome

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download dlfcn
        shell: pwsh
        run: |
          $uri = "https://github.com/dlfcn-win32/dlfcn-win32/archive/v1.2.0.tar.gz"
          $out = "v1.2.0.tar.gz"
          Invoke-WebRequest -Uri $uri -OutFile $out
          tar xvf $out -C ./cbuild --strip-components=1

      - name: Build dlfcn
        run: |
          mkdir cbuild
          cd cbuild
          mkdir install
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" --config Release -DCMAKE_INSTALL_PREFIX=../install .. -DBUILD_TESTS:BOOL=OFF
          cmake --build . --config Release --target install
          cd ../..

